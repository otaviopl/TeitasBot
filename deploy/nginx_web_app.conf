# Nginx config for the Personal Assistant PWA.
# Domain: app.carlosplf.com  |  Upstream: 127.0.0.1:8001 (uvicorn)

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name app.carlosplf.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.carlosplf.com;

    # SSL certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/app.carlosplf.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.carlosplf.com/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

    # PWA — static asset caching
    location /static/ {
        proxy_pass http://127.0.0.1:8001/static/;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400, immutable";
        proxy_set_header Host $host;
    }

    # Proxy to uvicorn
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Allow large file uploads
        client_max_body_size 25M;

        # Timeouts for long assistant responses
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
}
