# Nginx config for the Personal Assistant PWA.
# Add this server block or merge into your existing HTTPS config.

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name assistant.carlosplf.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name assistant.carlosplf.com.br;

    # SSL certificates (adjust paths to your setup)
    ssl_certificate     /etc/letsencrypt/live/assistant.carlosplf.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/assistant.carlosplf.com.br/privkey.pem;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Proxy to uvicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large file uploads
        client_max_body_size 25M;

        # Timeouts for long assistant responses
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }
}
