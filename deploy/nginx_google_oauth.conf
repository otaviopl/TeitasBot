# Add this location block inside the server {} block for dev.carlosplf.com.br
# to proxy Google OAuth callbacks to the local auth server.

location /auth/google/callback {
    proxy_pass http://127.0.0.1:8080/auth/google/callback;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
}
