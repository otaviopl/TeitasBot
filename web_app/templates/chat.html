<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="theme-color" content="#FFFFFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Assistente">
    <title>Assistente Pessoal</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/static/icons/bot-icon.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar overlay (mobile) -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <button class="btn-collapse-sidebar" id="btn-collapse-sidebar" title="Recolher menu">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="11 17 6 12 11 7"/>
                        <polyline points="18 17 13 12 18 7"/>
                    </svg>
                </button>
            </div>
            <div class="sidebar-header">
                <h2>Conversas</h2>
                <div class="sidebar-header-actions">
                    <button class="btn btn-primary btn-new-chat" id="btn-new-chat">+ Nova</button>
                </div>
            </div>
            <div class="sidebar-conversations" id="conversation-list">
                <!-- Dynamically populated -->
            </div>
            <div class="sidebar-notes" id="notes-list-section">
                <div class="sidebar-notes-header">
                    <h2>Anotações</h2>
                    <div class="sidebar-notes-actions">
                        <button class="btn-search-notes" id="btn-search-notes" title="Buscar por tag">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"/>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                            </svg>
                        </button>
                        <button class="btn btn-primary btn-new-note" id="btn-new-note">+ Nova</button>
                    </div>
                </div>
                <div class="sidebar-notes-search hidden" id="notes-search">
                    <div class="notes-search-wrapper">
                        <input type="text" class="notes-search-input" id="notes-search-input" placeholder="Filtrar por tag…" autocomplete="off">
                        <button class="notes-search-clear" id="notes-search-clear" title="Limpar filtro">✕</button>
                    </div>
                    <div class="notes-search-autocomplete hidden" id="notes-search-autocomplete">
                        <!-- Dynamically populated -->
                    </div>
                </div>
                <div class="sidebar-notes-list" id="notes-list">
                    <!-- Dynamically populated -->
                </div>
            </div>
            <div class="sidebar-footer">
                <button class="btn-notion-status" id="btn-notion-status" title="Status Notion">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16v16H4z"/>
                        <path d="M9 4v16"/>
                        <path d="M14 10l5-2"/>
                    </svg>
                    <span id="notion-status-label">Notion: verificar</span>
                </button>
                <button class="btn-google-connect" id="btn-google-connect" title="Conectar Google">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <span id="google-connect-label">Google: verificando…</span>
                </button>
                <button class="btn-logout" id="btn-logout-sidebar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Sair
                </button>
            </div>
        </aside>

        <!-- Chat main area -->
        <div class="chat-main">
            <!-- Header (fixed, full-width, blur) -->
            <header class="chat-header">
                <div class="chat-header-left">
                    <button class="btn-hamburger" id="btn-hamburger" title="Menu">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="6" x2="21" y2="6"/>
                            <line x1="3" y1="12" x2="21" y2="12"/>
                            <line x1="3" y1="18" x2="21" y2="18"/>
                        </svg>
                    </button>
                    <button class="btn-expand-sidebar" id="btn-expand-sidebar" title="Expandir menu">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="13 17 18 12 13 7"/>
                            <polyline points="6 17 11 12 6 7"/>
                        </svg>
                    </button>
                </div>
                <div class="chat-header-actions">
                    <div class="header-tabs" id="header-tabs">
                        <button class="header-tab active" data-tab="chat">Conversas</button>
                        <button class="header-tab" data-tab="notes">Anotações</button>
                    </div>
                </div>
                <div class="chat-header-right">
                    <button class="btn btn-ghost" id="btn-reset" title="Limpar conversa">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                            <path d="M10 11v6"/>
                            <path d="M14 11v6"/>
                            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                        </svg>
                    </button>
                    <button class="btn btn-ghost" id="btn-logout" title="Sair">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Messages -->
            <main class="chat-messages" id="chat-messages">
                <div class="typing-indicator" id="typing-indicator">
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                </div>
            </main>

            <!-- Chat empty state -->
            <div class="chat-empty hidden" id="chat-empty">
                <div class="empty-state-content">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <h3>Selecione uma Conversa</h3>
                    <p>Escolha uma conversa na lista ou inicie uma nova</p>
                    <button class="btn btn-primary" id="btn-new-chat-empty">+ Nova conversa</button>
                </div>
            </div>

            <!-- Input wrapper (blur + transparency) -->
            <div class="chat-input-wrapper">
                <!-- File preview -->
                <div class="file-preview" id="file-preview">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                    <span class="file-name" id="file-name"></span>
                    <span class="remove-file" id="remove-file">✕</span>
                </div>

                <!-- Input bar -->
                <div class="chat-input-bar">
                    <input type="file" id="file-input" class="sr-only" accept="*/*">
                    <button class="btn-icon" id="btn-attach" title="Anexar arquivo">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                        </svg>
                    </button>
                    <button class="btn-icon" id="btn-mic" title="Gravar áudio">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                            <line x1="8" y1="23" x2="16" y2="23"/>
                        </svg>
                    </button>
                    <textarea
                        id="chat-input"
                        rows="1"
                        placeholder="Digite uma mensagem…"
                        inputmode="text"
                        autocomplete="off"
                        autocorrect="on"
                        autocapitalize="sentences"
                        enterkeyhint="send"
                    ></textarea>
                    <button class="btn btn-primary btn-send" id="btn-send" title="Enviar" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Notes editor (hidden by default) -->
            <div class="notes-editor hidden" id="notes-editor">
                <div class="notes-editor-header">
                    <div class="note-title-area">
                        <h2 class="note-title-display" id="note-title-display">Nova anotação</h2>
                        <div class="note-tags" id="note-tags">
                            <!-- Dynamically populated with tag pills -->
                        </div>
                    </div>
                    <div class="notes-editor-actions">
                        <span class="note-save-status" id="note-save-status"></span>
                        <button class="btn btn-ghost" id="btn-delete-note" title="Excluir anotação">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                <path d="M10 11v6"/>
                                <path d="M14 11v6"/>
                                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="notes-editor-body">
                    <textarea id="note-content"></textarea>
                </div>
            </div>

            <!-- Notes empty state (hidden by default) -->
            <div class="notes-empty hidden" id="notes-empty">
                <div class="empty-state-content">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                    <h3>Selecione uma Nota</h3>
                    <p>Escolha uma anotação na lista ou crie uma nova</p>
                    <button class="btn btn-primary" id="btn-new-note-empty">+ Nova nota</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <!-- Notion status modal -->
    <div class="notion-modal-overlay" id="notion-modal-overlay">
        <div class="notion-modal">
            <h3>Status Notion</h3>
            <div id="notion-modal-content">
                <div class="notion-spinner"></div>
            </div>
            <button class="notion-modal-close" id="notion-modal-close">Fechar</button>
        </div>
    </div>

    <!-- Markdown renderer (lightweight) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
    <script src="/static/js/audio.js"></script>
    <script src="/static/js/app.js"></script>

    <!-- Service worker registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/js/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
